name: Build Windows Executable

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build user executable (no console)
        run: pyinstaller --onefile --noconsole --name ARCKAE-Finance launcher.py

      - name: Build debug executable (with console)
        run: pyinstaller --onefile --name ARCKAE-Finance-debug launcher.py

      - name: Upload executables
        uses: actions/upload-artifact@v4
        with:
          name: ARCKAE-Finance-Windows
          path: |
            dist/ARCKAE-Finance.exe
            dist/ARCKAE-Finance-debug.exe
